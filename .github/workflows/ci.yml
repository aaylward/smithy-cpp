name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  bazel:
    name: bazel (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-24.04
            cc: gcc
            cxx: g++
          - name: linux-clang
            os: ubuntu-24.04
            cc: clang
            cxx: clang++
          - name: macos-clang
            os: macos-14
          - name: windows-msvc
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: bazel test
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: bazelisk test //... --config=ci

  sanitizers:
    name: bazel (asan + ubsan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: bazel test with sanitizers
        env:
          CC: clang
          CXX: clang++
        run: bazelisk test //... --config=ci --config=asan --config=ubsan

  codegen:
    name: codegen (gradle)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"
      - name: gradle build
        run: gradle build spotlessCheck
        working-directory: codegen
      # The checked-in generated code under examples/*/generated is the golden
      # output; regeneration must be byte-identical.
      - name: check generated fixtures are current
        run: |
          (cd codegen && gradle generateFixtures)
          git diff --exit-code -- examples

  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # Boost headers so clang-tidy can process the Beast transport.
      - name: install boost headers
        run: sudo apt-get update -q && sudo apt-get install -y -q libboost-dev
      # Generated code (examples/*/generated) is exempt from format checks;
      # its shape is locked by the golden diff check in the codegen job.
      - name: clang-format
        run: |
          find runtime examples \( -name '*.h' -o -name '*.cc' \) ! -path '*/generated/*' \
            | xargs clang-format --dry-run --Werror
      # Excluded from tidy: src/json/json.cc includes the nlohmann backend,
      # which only exists inside the Bazel build graph; beast_src.cc is the
      # Boost implementation TU and only compiles with the BCR modules'
      # BOOST_*_SEPARATE_COMPILATION defines (no first-party code in it).
      - name: clang-tidy
        run: |
          find runtime/src examples -name '*.cc' ! -name '*_test.cc' ! -path '*/src/json/*' \
            ! -name 'beast_src.cc' ! -path '*/generated/*' -print0 \
            | xargs -0 -I{} clang-tidy --quiet {} -- -Iruntime/include -I. -std=c++20
      - name: buildifier
        run: npx -y @bazel/buildifier@8.2.1 --lint=warn --mode=check -r .
