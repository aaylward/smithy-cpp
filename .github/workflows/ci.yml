name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  bazel:
    name: bazel (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-24.04
            cc: gcc
            cxx: g++
          - name: linux-clang
            os: ubuntu-24.04
            cc: clang
            cxx: clang++
          - name: macos-clang
            os: macos-14
          - name: windows-msvc
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: bazel test
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: bazelisk test //... --config=ci

  sanitizers:
    name: bazel (asan + ubsan)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: bazel test with sanitizers
        env:
          CC: clang
          CXX: clang++
        run: bazelisk test //... --config=ci --config=asan --config=ubsan

  codegen:
    name: codegen (gradle)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"
      - name: gradle build
        run: gradle build spotlessCheck
        working-directory: codegen

  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: clang-format
        run: |
          find runtime -name '*.h' -o -name '*.cc' | xargs clang-format --dry-run --Werror
      - name: clang-tidy
        run: |
          clang-tidy runtime/src/core/version.cc -- -Iruntime/include -std=c++20
      - name: buildifier
        run: |
          npm install -g @bazel/buildifier@8.2.1
          buildifier --lint=warn --mode=check -r .
